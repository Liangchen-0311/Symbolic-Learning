# ==============================================================
# Neurosymbolic RL — CIFAR-100 v3: Optimized for Logistic Regression
# Strategy: mirror cifar10_v3 success — no SPP, relaxed accuracy
# gate, tighter correlation, LogReg evaluation
# Target: 60%+ test accuracy with logistic regression
# ==============================================================

dataset: "cifar100"
device: "cuda"

# ---- Operator filtering ----------------------------------------
exclude_operators:
  - spp_pool

# ---- Data augmentation -----------------------------------------
augment: true

# ---- Feature Bank Strategy (Scheme A) -----------------------
strategy:
  feature_bank_size: 3500            # same as cifar10_v3 — proven sweet spot
  lasso_target_features: 3500
  l1_lambda: 0.0
  l2_lambda: 0.0
  lasso_epochs: 100
  min_accuracy_threshold: 0.013      # lowered — let more weak features in
                                     # (random=1%, so 1.3% is still 30% above random)
  correlation_threshold: 0.78        # tighter than v2's 0.70 for diversity,
                                     # but not as strict as cifar10's 0.82
                                     # (100 classes need more features to slip through)
  diversity_penalty: 0.25

# ---- Model (Policy Agent — LSTM) ----------------------------
model:
  max_depth: 4                       # back to 4 (same as cifar10_v3) —
                                     # depth 5 didn't help much, and shallower
                                     # formulas are faster to evaluate
  max_sequence_length: 14
  embedding_dim: 128
  hidden_size: 256
  num_layers: 2
  dropout: 0.3

# ---- RL Training (PPO) --------------------------------------
training:
  iterations: 5000
  n_iterations: 5000
  episodes_per_iteration: 20
  batch_size: 2048
  eval_batch_size: 2048
  num_classes: 100

  learning_rate: 0.0005
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_coef: 0.5
  entropy_coef: 0.10                 # slightly higher than cifar10's 0.08
                                     # — more exploration needed for 100 classes
  max_grad_norm: 1.0
  n_epochs_ppo: 4
  batch_size_ppo: 64
  length_penalty: 0.005

  binary_op_bias: 1.0

# ---- Output --------------------------------------------------
output_dir: "outputs/cifar100_v3"
