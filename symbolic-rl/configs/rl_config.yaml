model:
  latent_dim: 20
  embedding_dim: 128
  hidden_size: 256
  num_layers: 2
  dropout: 0.1

training:
  batch_size: 64
  max_sequence_length: 15
  learning_rate: 0.0005
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_coef: 0.5
  entropy_coef: 0.08
  max_grad_norm: 0.5
  n_epochs_ppo: 4
  batch_size_ppo: 32
  n_iterations: 500
  episodes_per_iteration: 32
  classifier_train_steps: 20
  length_penalty: 0.001
  feature_bank_size: 15
  save_dir: "outputs/checkpoints"
