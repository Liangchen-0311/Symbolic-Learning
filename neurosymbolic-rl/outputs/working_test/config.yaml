dataset:
  name: cifar10
  num_classes: 10
  test_subset: 200
  train_subset: 1000
model:
  dropout: 0.3
  embedding_dim: 128
  hidden_size: 256
  max_depth: 3
  max_sequence_length: 15
  num_layers: 2
training:
  batch_size: 16
  batch_size_ppo: 32
  clip_epsilon: 0.2
  device: mps
  diversity_penalty: 0.3
  entropy_coef: 0.05
  episodes_per_iteration: 10
  feature_bank_size: 20
  gae_lambda: 0.95
  gamma: 0.99
  inactive_penalty: 0.05
  l1_lambda: 0.5
  lasso_epochs: 20
  lasso_prune_interval: 3
  lasso_target_features: 10
  learning_rate: 0.0005
  length_penalty: 0.01
  max_grad_norm: 1.0
  min_accuracy: 0.1
  min_diversity: 0.15
  n_epochs_ppo: 2
  n_iterations: 100
  value_coef: 0.5
